<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <title>Lumen Notes</title>
    <meta name="description" content="Bloc de notas minimalista con modo oscuro, búsqueda inteligente y guardado automático." />
    <meta name="application-name" content="Lumen Notes" />
    <meta name="author" content="Lumen Notes" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d0d14" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lumen" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />

    <!-- Open Graph -->
    <meta property="og:title" content="Lumen Notes" />
    <meta property="og:description" content="Bloc de notas minimalista con modo oscuro, búsqueda inteligente y guardado automático." />
    <meta property="og:type" content="website" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Prevent flash of light theme -->
    <style>
      html { background-color: #0d0d14; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
